name: Witchly Daily Claim

on:
  schedule:
    - cron: '10 0 * * *'   # 每天 UTC 00:10（北京时间 08:10）
  workflow_dispatch:         # 支持手动触发

jobs:
  claim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 安装 gost ─────────────────────────────────────────────────
      - name: Install gost
        run: |
          GOST_VER="3.0.0-rc10"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  GOST_ARCH="amd64" ;;
            aarch64) GOST_ARCH="arm64" ;;
            *)       GOST_ARCH="amd64" ;;
          esac
          curl -sSL "https://github.com/go-gost/gost/releases/download/v${GOST_VER}/gost_${GOST_VER}_linux_${GOST_ARCH}.tar.gz" \
            -o /tmp/gost.tar.gz
          tar -xzf /tmp/gost.tar.gz -C /tmp
          chmod +x /tmp/gost
          sudo mv /tmp/gost /usr/local/bin/gost
          gost -V

      # ── 执行签到脚本，完整捕获输出 ────────────────────────────────
      - name: Run daily claim
        id: claim
        env:
          DAILY_COOKIE:             ${{ secrets.DAILY_COOKIE }}
          DAILY_URL:                ${{ secrets.DAILY_URL }}
          DAILY_METHOD:             ${{ secrets.DAILY_METHOD }}
          DAILY_REFERER:            ${{ secrets.DAILY_REFERER }}
          DAILY_USER_AGENT:         ${{ secrets.DAILY_USER_AGENT }}
          DAILY_EXTRA_HEADERS_JSON: ${{ secrets.DAILY_EXTRA_HEADERS_JSON }}
          DAILY_BODY_JSON:          ${{ secrets.DAILY_BODY_JSON }}
          # 代理节点，格式: user:pass@host:port 或 host:port
          # 多节点用英文逗号分隔（脚本会逐个尝试）
          PROXY_NODE:               ${{ secrets.WITCHLY_PROXY_NODE }}
        run: |
          set +e
          OUTPUT=$(bash ./claim_witchly_daily.sh 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"     >> "$GITHUB_OUTPUT"
          echo "EOF"         >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"
          exit $EXIT_CODE

      # ── 失败日志上传为 Artifact ────────────────────────────────────
      - name: Save failure log
        if: failure()
        run: |
          mkdir -p /tmp/witchly-logs
          printf '%s\n' "${{ steps.claim.outputs.output }}" > /tmp/witchly-logs/failure.log
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
               >> /tmp/witchly-logs/failure.log

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-log-${{ github.run_id }}
          path: /tmp/witchly-logs/
          retention-days: 7

      # ── TG 通知：成功 ──────────────────────────────────────────────
      - name: Notify Telegram (success)
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          CLAIM_OUTPUT: ${{ steps.claim.outputs.output }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          MESSAGE=$(printf '✅ *Witchly 每日签到成功*\n\n📅 时间：%s CST\n📋 输出：\n```\n%s\n```\n🔗 [查看本次运行](%s)' \
            "$NOW" "$CLAIM_OUTPUT" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MESSAGE}"

      # ── TG 通知：失败（含日志文件） ───────────────────────────────
      - name: Notify Telegram (failure)
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          CLAIM_OUTPUT: ${{ steps.claim.outputs.output }}
          EXIT_CODE:    ${{ steps.claim.outputs.exit_code }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          MESSAGE=$(printf '❌ *Witchly 每日签到失败*\n\n📅 时间：%s CST\n💥 退出码：%s\n📋 输出：\n```\n%s\n```\n🔗 [查看完整日志](%s)' \
            "$NOW" "$EXIT_CODE" "$CLAIM_OUTPUT" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MESSAGE}"

          LOG_FILE="/tmp/witchly_failure_$(date +%Y%m%d_%H%M%S).log"
          printf '=== Witchly Daily Failure Log ===\nTime   : %s CST\nExit   : %s\nRun URL: %s\n\n=== Output ===\n%s\n' \
            "$NOW" "$EXIT_CODE" "$RUN_URL" "$CLAIM_OUTPUT" > "$LOG_FILE"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" \
            -F caption="⬆️ 完整执行日志" \
            -F document=@"$LOG_FILE"