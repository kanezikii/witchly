name: Witchly Daily Claim (Xray Proxy & Linkvertise Bypass)

on:
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Browser Dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      # ── 修复：将代理启动与爬虫运行合并到同一个 Step ──
      - name: Run Proxy and Puppeteer
        id: claim
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG_JSON }}
          DAILY_COOKIE: ${{ secrets.DAILY_COOKIE }}
        run: |
          if [ -z "$XRAY_CONFIG" ]; then
            echo "❌ 未找到 XRAY_CONFIG_JSON，请检查 Secrets 配置！"
            exit 1
          fi

          echo "🚀 下载并配置 Xray 核心..."
          curl -sSL -o xray.zip https://github.com/XTLS/Xray-core/releases/download/v1.8.4/Xray-linux-64.zip
          unzip -q xray.zip -d xray-bin
          chmod +x xray-bin/xray
          echo "$XRAY_CONFIG" > config.json

          echo "🌐 启动 Xray 代理..."
          # 将日志输出到 xray.log，并在后台运行
          ./xray-bin/xray run -c config.json > xray.log 2>&1 &
          XRAY_PID=$!
          
          # 给代理 3 秒钟的启动和握手时间
          sleep 3

          # 检查 Xray 进程是否存活
          if ! kill -0 $XRAY_PID 2>/dev/null; then
            echo "❌ Xray 代理启动失败！请检查 JSON 节点配置格式。日志如下："
            cat xray.log
            exit 1
          fi
          echo "✅ Xray 代理已稳定运行 (PID: $XRAY_PID)"

          # 运行自动签到脚本
          echo "🤖 启动浏览器执行任务..."
          
          echo "🔍 测试代理节点连通性..."
          # 使用 socks5h 强制让代理解析 DNS，测试 10 秒超时
          curl -s --socks5-hostname 127.0.0.1:10808 https://api.ipify.org?format=json --connect-timeout 10 || echo "⚠️ 警告: curl 测试代理超时或失败，节点可能无法使用！"
          echo ""

          set +e
          OUTPUT=$(node auto_claim.js 2>&1)
          EXIT_CODE=$?
          
          # 脚本执行完毕，清理并关闭 Xray 代理
          kill $XRAY_PID 2>/dev/null

          # 写入 GitHub Output 供后续 TG 通知使用
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"     >> "$GITHUB_OUTPUT"
          echo "EOF"         >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          
          echo "$OUTPUT"
          exit $EXIT_CODE

      - name: Notify Telegram (success)
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          CLAIM_OUTPUT: ${{ steps.claim.outputs.output }}
        run: |
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=✅ *Witchly 签到成功* ($NOW)%0A\`\`\`%0A${CLAIM_OUTPUT:0:1000}%0A\`\`\`"

      - name: Notify Telegram (failure)
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          CLAIM_OUTPUT: ${{ steps.claim.outputs.output }}
          EXIT_CODE:    ${{ steps.claim.outputs.exit_code }}
        run: |
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=❌ *Witchly 签到失败* ($NOW) - 退出码: $EXIT_CODE%0A\`\`\`%0A${CLAIM_OUTPUT:0:1000}%0A\`\`\`"
