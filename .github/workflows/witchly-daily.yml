name: Witchly Daily Claim

on:
  schedule:
    - cron: '10 0 * * *'   # 每天 UTC 00:10（北京时间 08:10）
  workflow_dispatch:         # 支持手动触发

jobs:
  claim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 执行签到脚本，完整捕获输出 ──────────────────────────────
      - name: Run daily claim
        id: claim
        env:
          DAILY_COOKIE:             ${{ secrets.DAILY_COOKIE }}
          DAILY_URL:                ${{ secrets.DAILY_URL }}
          DAILY_METHOD:             ${{ secrets.DAILY_METHOD }}
          DAILY_REFERER:            ${{ secrets.DAILY_REFERER }}
          DAILY_USER_AGENT:         ${{ secrets.DAILY_USER_AGENT }}
          DAILY_EXTRA_HEADERS_JSON: ${{ secrets.DAILY_EXTRA_HEADERS_JSON }}
          DAILY_BODY_JSON:          ${{ secrets.DAILY_BODY_JSON }}
        run: |
          set +e   # 不让 bash 自动 exit，由我们自己判断结果
          OUTPUT=$(bash ./claim_witchly_daily.sh 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"     >> "$GITHUB_OUTPUT"
          echo "EOF"         >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"
          exit $EXIT_CODE

      # ── 截图：失败时把完整日志上传为 Artifact ───────────────────
      - name: Save failure log as artifact
        if: failure()
        run: |
          mkdir -p /tmp/witchly-logs
          echo "${{ steps.claim.outputs.output }}" > /tmp/witchly-logs/failure.log
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
               >> /tmp/witchly-logs/failure.log

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-log-${{ github.run_id }}
          path: /tmp/witchly-logs/
          retention-days: 7

      # ── TG 通知：成功 ────────────────────────────────────────────
      - name: Notify Telegram (success)
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: |
          OUTPUT="${{ steps.claim.outputs.output }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="✅ *Witchly 每日签到成功*

📅 时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') CST
📋 输出：
\`\`\`
${OUTPUT}
\`\`\`
🔗 [查看本次运行](${RUN_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MESSAGE}"

      # ── TG 通知：失败（含日志截图文本） ─────────────────────────
      - name: Notify Telegram (failure)
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: |
          OUTPUT="${{ steps.claim.outputs.output }}"
          EXIT_CODE="${{ steps.claim.outputs.exit_code }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # 发送文字通知
          MESSAGE="❌ *Witchly 每日签到失败*

📅 时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') CST
💥 退出码：${EXIT_CODE}
📋 输出：
\`\`\`
${OUTPUT}
\`\`\`
🔗 [查看完整日志](${RUN_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MESSAGE}"

          # 把日志以文件形式再发一份（类似截图）
          LOG_FILE="/tmp/witchly_failure_$(date +%Y%m%d_%H%M%S).log"
          echo "=== Witchly Daily Failure Log ===" > "$LOG_FILE"
          echo "Time   : $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') CST" >> "$LOG_FILE"
          echo "Exit   : ${EXIT_CODE}" >> "$LOG_FILE"
          echo "Run URL: ${RUN_URL}" >> "$LOG_FILE"
          echo "" >> "$LOG_FILE"
          echo "=== Output ===" >> "$LOG_FILE"
          echo "${OUTPUT}" >> "$LOG_FILE"

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" \
            -F caption="⬆️ 完整执行日志" \
            -F document=@"$LOG_FILE"
