name: Witchly Server Renew

on:
  schedule:
    - cron: '20 1 */3 * *'   # 每 3 天 UTC 01:20（北京时间 09:20）自动续期
  workflow_dispatch:           # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get install -y zsh

      # ── 执行续期脚本，完整捕获输出 ──────────────────────────────
      - name: Run renew
        id: renew
        env:
          RENEW_URL:    ${{ secrets.RENEW_URL }}
          RENEW_COOKIE: ${{ secrets.DAILY_COOKIE }}
        run: |
          set +e

          # 脚本从文件读取 .env，这里改为直接写环境变量注入
          # 创建临时 env 文件供脚本 source
          echo "RENEW_URL=${RENEW_URL}" > .env.witchlyhost
          echo "RENEW_COOKIE=${RENEW_COOKIE}" >> .env.witchlyhost

          OUTPUT=$(zsh ./renew_witchlyhost.sh 2>&1)
          EXIT_CODE=$?

          rm -f .env.witchlyhost

          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"     >> "$GITHUB_OUTPUT"
          echo "EOF"         >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"
          exit $EXIT_CODE

      # ── 失败日志上传为 Artifact ──────────────────────────────────
      - name: Save failure log
        if: failure()
        run: |
          mkdir -p /tmp/witchly-logs
          printf '%s\n' "${{ steps.renew.outputs.output }}" > /tmp/witchly-logs/renew-failure.log
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
               >> /tmp/witchly-logs/renew-failure.log

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: renew-failure-log-${{ github.run_id }}
          path: /tmp/witchly-logs/
          retention-days: 7

      # ── TG 通知：成功 ────────────────────────────────────────────
      - name: Notify Telegram (success)
        if: success()
        env:
          TG_BOT_TOKEN:  ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:    ${{ secrets.TG_CHAT_ID }}
          RENEW_OUTPUT:  ${{ steps.renew.outputs.output }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          # 判断是"续期成功"还是"未到期跳过"
          if echo "$RENEW_OUTPUT" | grep -q "Too early\|skipped"; then
            ICON="⏭️"
            TITLE="Witchly 服务器未到期，跳过续期"
          else
            ICON="✅"
            TITLE="Witchly 服务器续期成功"
          fi
          MESSAGE=$(printf '%s *%s*\n\n📅 时间：%s CST\n📋 输出：\n```\n%s\n```\n🔗 [查看本次运行](%s)' \
            "$ICON" "$TITLE" "$NOW" "$RENEW_OUTPUT" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MESSAGE}"

      # ── TG 通知：失败（含日志文件） ──────────────────────────────
      - name: Notify Telegram (failure)
        if: failure()
        env:
          TG_BOT_TOKEN:  ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:    ${{ secrets.TG_CHAT_ID }}
          RENEW_OUTPUT:  ${{ steps.renew.outputs.output }}
          EXIT_CODE:     ${{ steps.renew.outputs.exit_code }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          MESSAGE=$(printf '❌ *Witchly 服务器续期失败*\n\n📅 时间：%s CST\n💥 退出码：%s\n📋 输出：\n```\n%s\n```\n🔗 [查看完整日志](%s)' \
            "$NOW" "$EXIT_CODE" "$RENEW_OUTPUT" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MESSAGE}"

          LOG_FILE="/tmp/witchly_renew_failure_$(date +%Y%m%d_%H%M%S).log"
          printf '=== Witchly Renew Failure Log ===\nTime   : %s CST\nExit   : %s\nRun URL: %s\n\n=== Output ===\n%s\n' \
            "$NOW" "$EXIT_CODE" "$RUN_URL" "$RENEW_OUTPUT" > "$LOG_FILE"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" \
            -F caption="⬆️ 续期失败完整日志" \
            -F document=@"$LOG_FILE"
